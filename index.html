<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NOCD - OCD Removing Psychological Tasking Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #8b0000;
            --bg-black: #080808;
            --glass-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at center, #1a0000 0%, #080808 100%);
            color: var(--primary-red);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .fade-out { opacity: 0 !important; pointer-events: none !important; }

        .loader-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--primary-red); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--primary-red); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--primary-red); }
        }

        /* Container */
        .container {
            width: 92%;
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        h1 { text-align: center; font-size: 2.2rem; letter-spacing: 1.5px; margin-bottom: 5px; text-shadow: 0 0 10px red; }
        .subtitle { text-align: center; color: #ccc; font-size: 0.8rem; margin-bottom: 25px; opacity: 0.7; }

        .input-area { display: flex; gap: 10px; margin-bottom: 25px; }

        #noteInput {
            flex: 1;
            padding: 12px;
            background: #000;
            border: 1px solid var(--dark-red);
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        .add-btn {
            padding: 12px 20px;
            background: var(--primary-red);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:active { transform: scale(0.95); }

        ul { list-style: none; padding: 0; width: 100%; }
        li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 0, 0, 0.1);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #eee;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .delete-btn { background: none; border: none; color: var(--primary-red); cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .delete-btn:hover { transform: scale(1.2); }

        li.removing {
            transform: scale(0.9) translateX(30px);
            opacity: 0;
            transition: 0.5s;
            background: rgba(0, 255, 0, 0.05);
        }

        /* Music Controller */
        #musicToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid var(--primary-red);
            color: var(--primary-red);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
        }

        footer { margin-top: auto; padding: 25px; font-size: 0.85rem; color: #666; text-align: center; }
        footer b { color: var(--primary-red); letter-spacing: 1px; }

        @media (max-width: 480px) {
            .input-area { flex-direction: column; }
            .add-btn { width: 100%; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="preloader">
    <img src="./nocd.png" alt="NOCD..." class="loader-img">
</div>


    <div class="container">
        <h1>NOCD</h1>
        <div class="subtitle">OCD Removing Psychological Tasking Application</div>

        <div class="input-area">
            <input type="text" id="noteInput" placeholder="আপনার অবসেসিভ চিন্তাটি লিখুন..." />
            <button class="add-btn" onclick="addNote()">TRIGGER</button>
        </div>

        <ul id="noteList"></ul>
    </div>

    <div id="musicToggle" onclick="toggleMusic()">🎵</div>

    <footer>
        Developed by <b>Humayun Shariar Himu</b>
    </footer>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://raw.githubusercontent.com/HumayunShariarHimu/NOCD/main/meditation_music.mp3" type="audio/mpeg">
    </audio>
    <audio id="removeSound" preload="auto">
        <source src="https://raw.githubusercontent.com/HumayunShariarHimu/NOCD/main/remove.mp3" type="audio/mpeg">
    </audio>

    <script>
        let notes = JSON.parse(localStorage.getItem('ocdNotes')) || [];
        const bgMusic = document.getElementById('bgMusic');
        const removeSound = document.getElementById('removeSound');
        const musicToggle = document.getElementById('musicToggle');

        // Set remove sound volume to be light (0.3 = 30%)
        removeSound.volume = 0.3;

        function displayNotes() {
            const noteList = document.getElementById('noteList');
            noteList.innerHTML = '';
            notes.forEach((note, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${note}</span>
                    <button class="delete-btn" onclick="deleteNote(${index}, this.parentElement)">✕</button>
                `;
                noteList.appendChild(li);
            });
        }

        function addNote() {
            const noteInput = document.getElementById('noteInput');
            const noteText = noteInput.value.trim();
            if(noteText) {
                // Play background music on trigger
                if (bgMusic.paused) {
                    bgMusic.play().then(() => {
                        musicToggle.style.display = 'flex';
                    }).catch(e => console.log("Play blocked, waiting for interaction"));
                }

                for(let i=0; i<11; i++) {
                    notes.push(noteText);
                }
                localStorage.setItem('ocdNotes', JSON.stringify(notes));
                noteInput.value = '';
                displayNotes();
            }
        }

        function deleteNote(index, liElement) {
            // Play remove sound at low volume
            removeSound.currentTime = 0;
            removeSound.play();

            liElement.classList.add('removing');
            
            setTimeout(() => {
                notes.splice(index, 1);
                localStorage.setItem('ocdNotes', JSON.stringify(notes));
                displayNotes();
            }, 500);
        }

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                musicToggle.innerText = '🎵';
            } else {
                bgMusic.pause();
                musicToggle.innerText = '🔇';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            displayNotes();
            setTimeout(() => {
                document.getElementById('preloader').classList.add('fade-out');
            }, 1000);
        });
    </script>
</body>
</html>
